# Limine configuration for RunixOS

# Enable serial console input/output for Limine
SERIAL=yes

# Disable graphics mode for headless execution
GRAPHICS=no

# Timeout in seconds before the default entry boots
TIMEOUT=0

# The default entry to boot (1-indexed)
DEFAULT_ENTRY=1

# The boot menu entry for RunixOS
:RunixOS
    PROTOCOL=limine
    KERNEL_PATH=boot:///boot/runixos
